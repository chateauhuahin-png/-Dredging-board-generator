<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ระบบสร้างบอร์ดชี้แจง - นพค.43</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Sarabun', 'TH Sarabun PSK', Arial, sans-serif;
    background: #0b1464;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
    gap: 0;
  }
  .card {
    background: white;
    border-radius: 12px;
    padding: 40px;
    width: 100%;
    max-width: 600px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.3);
  }
  h1 { color: #0b1464; font-size: 24px; text-align: center; margin-bottom: 8px; }
  .subtitle { color: #666; text-align: center; font-size: 14px; margin-bottom: 32px; }
  .form-group { margin-bottom: 20px; }
  label { display: block; font-weight: bold; color: #0b1464; margin-bottom: 6px; font-size: 15px; }
  .required { color: #e53e3e; }
  input[type="file"] {
    width: 100%; padding: 10px 12px;
    border: 2px dashed #cbd5e0; border-radius: 8px;
    cursor: pointer; font-size: 14px; transition: border-color 0.2s;
  }
  input[type="file"]:hover { border-color: #0b1464; }
  .btn {
    width: 100%; padding: 14px;
    background: #0b1464; color: #ffd700;
    border: none; border-radius: 8px;
    font-size: 18px; font-weight: bold;
    cursor: pointer; margin-top: 8px; transition: background 0.2s;
  }
  .btn:hover { background: #1a2a9b; }
  .btn:disabled { background: #a0aec0; cursor: not-allowed; }
  .status {
    margin-top: 20px; padding: 16px;
    border-radius: 8px; text-align: center;
    font-size: 16px; display: none;
  }
  .status.loading { background: #ebf8ff; color: #2b6cb0; display: block; }
  .status.success { background: #f0fff4; color: #276749; display: block; }
  .status.error   { background: #fff5f5; color: #c53030; display: block; }
  .download-btn {
    display: inline-block; margin-top: 12px;
    padding: 10px 24px; background: #276749;
    color: white; border-radius: 6px;
    text-decoration: none; font-weight: bold; font-size: 16px;
  }
  .progress-wrap {
    width: 100%; background: #bee3f8;
    border-radius: 6px; height: 10px;
    margin-top: 12px; overflow: hidden; display: none;
  }
  .progress-bar { height: 100%; background: #2b6cb0; width: 0%; transition: width 0.3s; }
  .spinner {
    display: inline-block; width: 20px; height: 20px;
    border: 3px solid #bee3f8; border-top-color: #2b6cb0;
    border-radius: 50%; animation: spin 0.8s linear infinite;
    vertical-align: middle; margin-right: 8px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Gear animation (outside card, on navy background) ── */
  .gear-outer {
    display: none;
    flex-direction: column;
    align-items: center;
    margin-top: 28px;
    width: 100%;
    max-width: 600px;
  }
  .gear-outer.active { display: flex; }
  .gear-label {
    color: #ffd700;
    font-size: 16px;
    margin-top: 12px;
    letter-spacing: 0.5px;
    text-align: center;
  }
  .gear-elapsed {
    color: rgba(255,255,255,0.6);
    font-size: 13px;
    margin-top: 4px;
    text-align: center;
  }
</style>
</head>
<body>

<div class="card">
  <h1>🗂️ ระบบสร้างบอร์ดชี้แจง</h1>
  <p class="subtitle">นทพ. | ความละเอียด 150 DPI พร้อมพิมพ์ขนาด 120×80 cm</p>

  <form id="boardForm">
    <div class="form-group">
      <label>ไฟล์ PowerPoint <span class="required">*</span></label>
      <input type="file" id="pptxInput" accept=".pptx" required>
    </div>
    <button type="submit" class="btn" id="submitBtn">สร้างบอร์ดชี้แจง</button>
  </form>

  <div class="progress-wrap" id="progressWrap">
    <div class="progress-bar" id="progressBar"></div>
  </div>
  <div class="status" id="status"></div>
</div>

<!-- Gear animation — outside the card, on the blue background -->
<div class="gear-outer" id="gearOuter">
  <svg id="gearSvg" viewBox="0 0 240 150" width="240" height="150"></svg>
  <div class="gear-label" id="gearLabel">กำลังอัปโหลดไฟล์...</div>
  <div class="gear-elapsed" id="gearElapsed"></div>
</div>

<script>
const CHUNK_SIZE = 5 * 1024 * 1024;

/* ── Gear drawing & animation ─────────────────────────────────────── */
(function initGears() {
  const svg   = document.getElementById('gearSvg');
  const GOLD  = '#ffd700';
  const DARK  = '#060e4a';  // dark navy for hub hole

  function gearPath(Ro, Ri, n, ratio) {
    const step = (2 * Math.PI) / n;
    const th   = step * ratio / 2;
    const ch   = th * 0.13;
    let d = '';
    for (let i = 0; i < n; i++) {
      const a   = (i / n) * 2 * Math.PI;
      const pts = [
        [Ri * Math.cos(a - th - ch), Ri * Math.sin(a - th - ch)],
        [Ro * Math.cos(a - th + ch), Ro * Math.sin(a - th + ch)],
        [Ro * Math.cos(a + th - ch), Ro * Math.sin(a + th - ch)],
        [Ri * Math.cos(a + th + ch), Ri * Math.sin(a + th + ch)],
      ];
      d += (i === 0 ? 'M' : 'L') +
        pts.map(p => `${p[0].toFixed(2)},${p[1].toFixed(2)}`).join(' L ') + ' ';
    }
    return d + 'Z';
  }

  function el(tag, attrs) {
    const e = document.createElementNS('http://www.w3.org/2000/svg', tag);
    for (const [k, v] of Object.entries(attrs)) e.setAttribute(k, v);
    return e;
  }

  function buildGear(cx, cy, Ro, Ri, hub, n, ratio) {
    const g = el('g', {});
    g.appendChild(el('path',   { d: gearPath(Ro, Ri, n, ratio), fill: GOLD }));
    g.appendChild(el('circle', { cx: 0, cy: 0, r: hub,           fill: GOLD }));
    g.appendChild(el('circle', { cx: 0, cy: 0, r: hub * 0.4,     fill: DARK }));
    g._cx = cx; g._cy = cy;
    svg.appendChild(g);
    return g;
  }

  // Large gear 8 teeth centered at (78, 75)
  // Small gear 5 teeth centered at (158, 75)  — distance 80 ≈ pitchR1(42)+pitchR2(27)
  const lg = buildGear(78,  75, 52, 39, 15, 8, 0.44);
  const sg = buildGear(158, 75, 33, 25,  9, 5, 0.44);

  let angle = 0;
  let rafId = null;
  const DEG_PER_FRAME = 0.55;

  function tick() {
    angle = (angle + DEG_PER_FRAME) % 360;
    lg.setAttribute('transform', `translate(78,75) rotate(${angle})`);
    sg.setAttribute('transform', `translate(158,75) rotate(${-(angle * 8 / 5)})`);
    rafId = requestAnimationFrame(tick);
  }

  window.startGears = function() {
    document.getElementById('gearOuter').classList.add('active');
    if (!rafId) tick();
  };
  window.stopGears = function() {
    if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
    document.getElementById('gearOuter').classList.remove('active');
  };
  window.setGearLabel   = t => { document.getElementById('gearLabel').textContent   = t; };
  window.setGearElapsed = t => { document.getElementById('gearElapsed').textContent = t; };
})();

/* ── Main form ────────────────────────────────────────────────────── */
document.getElementById("boardForm").addEventListener("submit", async function(e) {
  e.preventDefault();

  const btn          = document.getElementById("submitBtn");
  const statusEl     = document.getElementById("status");
  const progressWrap = document.getElementById("progressWrap");
  const progressBar  = document.getElementById("progressBar");
  const file = document.getElementById("pptxInput").files[0];

  if (!file) {
    statusEl.className = "status error";
    statusEl.innerHTML = "❌ กรุณาเลือกไฟล์ PPTX";
    return;
  }

  btn.disabled = true;
  statusEl.style.display = "none";
  progressWrap.style.display = "block";
  progressBar.style.width = "0%";

  // ── เริ่มหมุนตั้งแต่ช่วงอัปโหลด ──
  startGears();
  setGearLabel("กำลังอัปโหลดไฟล์...");
  setGearElapsed("");

  try {
    // 1. Start upload session
    const startRes = await fetch("/upload/start", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({ filename: file.name })
    });
    const { upload_id } = await startRes.json();

    // 2. Upload chunks
    const totalChunks = Math.ceil(file.size / CHUNK_SIZE);
    for (let i = 0; i < totalChunks; i++) {
      const chunk = file.slice(i * CHUNK_SIZE, (i + 1) * CHUNK_SIZE);
      const fd = new FormData();
      fd.append("upload_id", upload_id);
      fd.append("chunk_index", i);
      fd.append("total_chunks", totalChunks);
      fd.append("chunk", chunk);

      const res = await fetch("/upload/chunk", { method: "POST", body: fd });
      if (!res.ok) throw new Error("อัปโหลด chunk ล้มเหลว");

      const pct = Math.round(((i + 1) / totalChunks) * 60);
      progressBar.style.width = pct + "%";
      setGearLabel(`กำลังอัปโหลดไฟล์... ${pct}%`);
    }

    // 3. Start generating
    progressBar.style.width = "65%";
    setGearLabel("กำลังสร้างบอร์ดชี้แจง...");
    setGearElapsed("");

    const genRes = await fetch("/generate", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({ upload_id })
    });

    let genData;
    try {
      genData = await genRes.json();
    } catch (parseErr) {
      const rawText = await genRes.text().catch(() => "(empty)");
      throw new Error(`HTTP ${genRes.status} — server response: ${rawText.substring(0, 200)}`);
    }
    if (!genRes.ok) throw new Error(genData.error || "เริ่มสร้างบอร์ดไม่สำเร็จ");

    const job_id = genData.job_id;

    // 4. Poll status
    const poll = setInterval(async () => {
      try {
        const sRes  = await fetch(`/status/${job_id}`);
        const sData = await sRes.json();

        if (sData.status === "done") {
          clearInterval(poll);
          stopGears();
          progressBar.style.width = "100%";
          statusEl.className = "status success";
          statusEl.style.display = "block";
          statusEl.innerHTML = `✅ สร้างบอร์ดสำเร็จ!<br>
            <a class="download-btn" href="${sData.url}">⬇️ ดาวน์โหลด JPG</a>`;
          btn.disabled = false;

        } else if (sData.status === "error") {
          clearInterval(poll);
          stopGears();
          statusEl.className = "status error";
          statusEl.style.display = "block";
          statusEl.innerHTML = `❌ เกิดข้อผิดพลาด: ${sData.error}`;
          btn.disabled = false;

        } else if (sData.status === "not_found") {
          clearInterval(poll);
          stopGears();
          statusEl.className = "status error";
          statusEl.style.display = "block";
          statusEl.innerHTML = `❌ Server หยุดทำงานกลางคัน กรุณาลองใหม่อีกครั้ง`;
          btn.disabled = false;

        } else {
          const elapsed  = sData.elapsed || 0;
          const mins     = Math.floor(elapsed / 60);
          const secs     = elapsed % 60;
          const timeStr  = mins > 0 ? `${mins} นาที ${secs} วินาที` : `${secs} วินาที`;
          const pct      = Math.min(65 + (elapsed / 300) * 30, 95);
          progressBar.style.width = pct.toFixed(0) + "%";
          setGearElapsed(`ผ่านไป ${timeStr}`);
        }
      } catch (_) { /* network hiccup — keep polling */ }
    }, 3000);

  } catch (err) {
    stopGears();
    statusEl.className = "status error";
    statusEl.style.display = "block";
    statusEl.innerHTML = `❌ เกิดข้อผิดพลาด: ${err.message}`;
    btn.disabled = false;
  }
});
</script>
</body>
</html>
